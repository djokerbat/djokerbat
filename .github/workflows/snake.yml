name: github-readme-snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # اعمل فولدر dist لو مش موجود
      - name: Create dist folder
        run: mkdir -p dist

      # يولد Snake داخل dist
      - name: Generate Snake Dark Mode
        uses: Platane/snk@v3
        with:
          github_user_name: djokerbat
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark

      # Push الملف على نفس الفرع (main)
      - name: Push generated SVG
        uses: crazy-max/ghaction-github-pages@v2.6.0
        with:
          target_branch: main    # ممكن تغيّريه لو عايزة output branch
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


           


